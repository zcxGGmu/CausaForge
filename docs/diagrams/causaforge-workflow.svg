  <path d="M 335,248 L 365,248" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 485,248 L 515,248" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 635,248 L 665,248" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 785,248 L 815,248" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 935,248 L 965,248" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 1085,248 L 1110,248" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 725,210 L 725,146 L 575,146 L 575,210" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-red)"/>
  <rect x="615.0" y="121" width="90.0" height="20" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="660" y="135" text-anchor="middle" class="label">test failure</text>
  <path d="M 875,210 L 875,118 L 590,118 L 590,210" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-red)"/>
  <rect x="687.0" y="92" width="90.0" height="20" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="732" y="106" text-anchor="middle" class="label">review block</text>
  <path d="M 1025,210 L 1025,90 L 605,90 L 605,210" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-red)"/>
  <rect x="763.8" y="64" width="96.5" height="20" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="812" y="78" text-anchor="middle" class="label">diff mismatch</text>
  <polygon points="275,336.0 316.0,362 275,388.0 234.0,362" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="275" y="366" text-anchor="middle" class="gate">Cause?</text>
  <polygon points="425,336.0 466.0,362 425,388.0 384.0,362" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="425" y="366" text-anchor="middle" class="gate">Plan?</text>
  <polygon points="575,336.0 616.0,362 575,388.0 534.0,362" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="575" y="366" text-anchor="middle" class="gate">Scope?</text>
  <polygon points="725,336.0 766.0,362 725,388.0 684.0,362" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="725" y="366" text-anchor="middle" class="gate">Tests?</text>
  <polygon points="875,336.0 916.0,362 875,388.0 834.0,362" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="875" y="366" text-anchor="middle" class="gate">Review?</text>
  <polygon points="1025,336.0 1066.0,362 1025,388.0 984.0,362" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="1025" y="366" text-anchor="middle" class="gate">Deliver?</text>
