<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">CausaForge Workflow</title>
  <desc id="desc">CausaForge six-stage evidence-chain workflow with gates and rollback paths.</desc>
  <style>
    text { font-family: Inter, Arial, Helvetica, sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .step-title { font-size: 13px; font-weight: 700; }
    .node-sub { font-size: 11px; fill: #6b7280; }
    .gate { font-size: 11px; font-weight: 700; fill: #374151; }
    .label { font-size: 11px; fill: #374151; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="40" y="44" class="title">CausaForge Core Workflow</text>
  <text x="40" y="68" class="subtitle">Each phase emits one schema-validated artifact; failed gates return to Building for a controlled repair pass.</text>
  <rect x="45" y="210" width="130" height="76" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="110.0" y="237" text-anchor="middle" class="step-title">Input</text>
  <text x="110.0" y="258" text-anchor="middle" class="node-sub">problem statement</text>
  <text x="110.0" y="274" text-anchor="middle" class="node-sub">or imported cause</text>
  <rect x="215" y="210" width="120" height="76" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="275.0" y="237" text-anchor="middle" class="step-title">Root Cause</text>
  <text x="275.0" y="258" text-anchor="middle" class="node-sub">scope boundary</text>
  <text x="275.0" y="274" text-anchor="middle" class="node-sub">root-cause</text>
  <rect x="365" y="210" width="120" height="76" rx="12" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="425.0" y="237" text-anchor="middle" class="step-title">Planning</text>
  <text x="425.0" y="258" text-anchor="middle" class="node-sub">approved paths</text>
  <text x="425.0" y="274" text-anchor="middle" class="node-sub">patch-plan</text>
  <rect x="515" y="210" width="120" height="76" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="575.0" y="237" text-anchor="middle" class="step-title">Building</text>
  <text x="575.0" y="258" text-anchor="middle" class="node-sub">candidate patch</text>
  <text x="575.0" y="274" text-anchor="middle" class="node-sub">patch-candidate</text>
  <rect x="665" y="210" width="120" height="76" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="725.0" y="237" text-anchor="middle" class="step-title">Verifying</text>
  <text x="725.0" y="258" text-anchor="middle" class="node-sub">regression proof</text>
  <text x="725.0" y="274" text-anchor="middle" class="node-sub">verification</text>
  <rect x="815" y="210" width="120" height="76" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="875.0" y="237" text-anchor="middle" class="step-title">Reviewing</text>
  <text x="875.0" y="258" text-anchor="middle" class="node-sub">independent check</text>
  <text x="875.0" y="274" text-anchor="middle" class="node-sub">review</text>
  <rect x="965" y="210" width="120" height="76" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="1025.0" y="237" text-anchor="middle" class="step-title">Delivering</text>
  <text x="1025.0" y="258" text-anchor="middle" class="node-sub">consistency check</text>
  <text x="1025.0" y="274" text-anchor="middle" class="node-sub">delivery</text>
  <rect x="1110" y="210" width="55" height="76" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="1137.5" y="237" text-anchor="middle" class="step-title">Done</text>
  <text x="1137.5" y="258" text-anchor="middle" class="node-sub">complete</text>
