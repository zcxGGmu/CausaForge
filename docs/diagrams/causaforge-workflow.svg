  <path d="M 275,388 L 275,424" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
  <path d="M 425,286 L 425,336" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-gray)"/>
  <path d="M 425,388 L 425,424" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
  <path d="M 575,286 L 575,336" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-gray)"/>
  <path d="M 575,388 L 575,424" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
  <path d="M 725,286 L 725,336" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-gray)"/>
  <path d="M 725,388 L 725,424" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
  <path d="M 875,286 L 875,336" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-gray)"/>
  <path d="M 875,388 L 875,424" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
  <path d="M 1025,286 L 1025,336" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-gray)"/>
  <path d="M 1025,388 L 1025,424" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
  <path d="M 220,424 L 320,424 L 332,436 L 332,470 L 220,470 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <path d="M 320,424 L 320,436 L 332,436" fill="none" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="276" y="451" text-anchor="middle" class="node-sub">root-cause.json</text>
  <path d="M 370,424 L 470,424 L 482,436 L 482,470 L 370,470 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <path d="M 470,424 L 470,436 L 482,436" fill="none" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="426" y="451" text-anchor="middle" class="node-sub">patch-plan.json</text>
  <path d="M 520,424 L 620,424 L 632,436 L 632,470 L 520,470 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <path d="M 620,424 L 620,436 L 632,436" fill="none" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="576" y="451" text-anchor="middle" class="node-sub">patch.diff</text>
  <path d="M 670,424 L 770,424 L 782,436 L 782,470 L 670,470 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <path d="M 770,424 L 770,436 L 782,436" fill="none" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="726" y="451" text-anchor="middle" class="node-sub">verification.json</text>
  <path d="M 820,424 L 920,424 L 932,436 L 932,470 L 820,470 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <path d="M 920,424 L 920,436 L 932,436" fill="none" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="876" y="451" text-anchor="middle" class="node-sub">review.json</text>
  <path d="M 970,424 L 1070,424 L 1082,436 L 1082,470 L 970,470 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <path d="M 1070,424 L 1070,436 L 1082,436" fill="none" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="1026" y="451" text-anchor="middle" class="node-sub">delivery-package</text>
  <g transform="translate(45,510)">
    <rect x="0" y="0" width="510" height="78" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="18" y="25" class="step-title">Gate Rules</text>
    <text x="18" y="47" class="node-sub">1. Every artifact must match its schema and upstream artifact references.</text>
    <text x="18" y="65" class="node-sub">2. Writes must match current agent, phase, and approved product paths.</text>
  </g>
  <g transform="translate(620,510)">
    <rect x="0" y="0" width="530" height="78" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <line x1="18" y1="24" x2="52" y2="24" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="62" y="29" class="node-sub">Phase advance</text>
    <line x1="175" y1="24" x2="209" y2="24" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
    <text x="219" y="29" class="node-sub">Persist evidence</text>
    <line x1="350" y1="24" x2="384" y2="24" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-red)"/>
    <text x="394" y="29" class="node-sub">Rollback</text>
    <text x="18" y="58" class="node-sub">Completion is proven by artifact chain, real patch files, and regression evidence.</text>
  </g>
</svg>
